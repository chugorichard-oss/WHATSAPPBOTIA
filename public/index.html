<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KurtBot — El Boliviano Puede</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&display=swap');
  * { margin:0;padding:0;box-sizing:border-box; }
  body { font-family:'Sora',sans-serif; background:#011A4B; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { text-align:center; padding:3rem 2rem; max-width:400px; }
  .flag { display:flex; height:8px; border-radius:4px; overflow:hidden; margin-bottom:2rem; }
  .flag div { flex:1; }
  h1 { font-size:2.5rem; font-weight:800; margin-bottom:1rem; }
  h1 span { color:#FFD600; }
  p { color:#AABBDD; line-height:1.7; margin-bottom:2rem; }
  .btn { display:inline-block; background:#C62828; color:#fff; padding:1rem 2.5rem; border-radius:12px; text-decoration:none; font-weight:700; font-size:1.1rem; transition:all 0.2s; }
  .btn:hover { background:#EF5350; transform:translateY(-2px); }
  .status { margin-top:1.5rem; font-size:0.85rem; color:#546E7A; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#4CAF50; margin-right:0.4rem; box-shadow:0 0 6px #4CAF50; }
</style>
</head>
<body>
<div class="card">
  <div class="flag"><div style="background:#C62828"></div><div style="background:#fff"></div><div style="background:#003087"></div></div>
  <h1>Kurt<span>Bot</span></h1>
  <p>El asistente digital de la campaña de <strong style="color:#fff">Kurt Reintsch</strong> para la Gobernación de La Paz.<br><br>¡El Boliviano Puede! 🇧🇴</p>
  <a href="https://wa.me/?text=Hola" class="btn">💬 Chatear en WhatsApp</a>
  <div class="status"><span class="dot"></span>Bot activo — LIBRE · Libertad y República</div>
</div>
</body>
</html>
